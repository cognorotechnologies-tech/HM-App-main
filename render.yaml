services:
  - type: web
    name: hm-app-backend
    env: node
    region: singapore # Optional: choose closest region
    plan: free # Optional: free tier
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User must provide this manually in Dashboard
      - key: JWT_SECRET
        sync: false # User must provide this manually in Dashboard
    autoDeploy: false
